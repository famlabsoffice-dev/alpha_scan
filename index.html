<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underdog Terminal | AlphaScan v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --dark-bg: #020617;
        }
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden;
        }
        .terminal-container { 
            border: 1px solid rgba(0, 255, 136, 0.2); 
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.05);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }
        .scan-line {
            height: 2px;
            background: rgba(0, 255, 136, 0.1);
            width: 100%;
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .live-dot { 
            height: 6px; width: 6px; 
            background-color: var(--neon-green); 
            border-radius: 50%; 
            display: inline-block; 
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-green); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-4xl relative overflow-hidden terminal-container rounded-xl p-6 border border-slate-800">
        <div class="scan-line"></div>
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase text-white flex items-center gap-2">
                    <span class="text-emerald-500">◣</span> ALPHASCAN <span class="text-slate-500 text-xs font-normal italic">PRO-SECURE</span>
                </h1>
                <p class="text-[10px] text-slate-500 mt-1 tracking-[0.2em]">CONNECTED TO: CLOUDFLARE EDGE NETWORK</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <div class="flex items-center gap-2 text-[10px] text-emerald-400 font-bold">
                    <span class="live-dot"></span> ENCRYPTED SESSION ACTIVE
                </div>
                <div id="clock" class="text-slate-500 text-[10px] mt-1 italic">SYSTEM TIME: --:--:--</div>
            </div>
        </div>

        <div id="stats-bar" class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-slate-900/50 p-3 border border-slate-800 rounded">
                <div class="text-slate-500 text-[9px] uppercase">Polymarket</div>
                <div id="stat-poly" class="text-lg font-bold text-white">--</div>
            </div>
            <div class="bg-slate-900/50 p-3 border border-slate-800 rounded">
                <div class="text-slate-500 text-[9px] uppercase">Kalshi</div>
                <div id="stat-kals" class="text-lg font-bold text-white">--</div>
            </div>
            <div class="bg-slate-900/50 p-3 border border-slate-800 rounded">
                <div class="text-slate-500 text-[9px] uppercase">Manifold</div>
                <div id="stat-mani" class="text-lg font-bold text-white">--</div>
            </div>
        </div>

        <div class="bg-black/40 border border-slate-800 rounded-lg p-4 mb-6">
            <div id="display" class="space-y-4 min-h-[350px] max-h-[500px] overflow-y-auto pr-2">
                <div class="text-slate-500 text-xs italic">System bereit. Initialisiere Bridge zu alphascan2...</div>
            </div>
        </div>

        <button onclick="triggerScan()" id="action-btn" class="relative overflow-hidden w-full group transition-all duration-300">
            <div class="absolute inset-0 bg-emerald-500 opacity-10 group-hover:opacity-20 transition-opacity"></div>
            <div class="border border-emerald-500/50 group-hover:border-emerald-400 py-4 rounded text-emerald-400 uppercase font-black text-xs tracking-widest flex items-center justify-center gap-3">
                <span id="btn-text">Execute Full Market Scan</span>
            </div>
        </button>
        
        <div class="mt-6 text-center">
            <p class="text-[9px] text-slate-600 uppercase tracking-tighter">AlphaScan Version 3.5 © 2026 Underdog Capital Management</p>
        </div>
    </div>

    <script>
        // DIE KORREKTE URL ZU DEINEM WORKER
        const WORKER_URL = 'https://alphascan2.famlabsoffice.workers.dev/';

        function updateClock() {
            document.getElementById('clock').innerText = "SYSTEM TIME: " + new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function triggerScan() {
            const display = document.getElementById('display');
            const btn = document.getElementById('action-btn');
            const btnText = document.getElementById('btn-text');
            
            btn.disabled = true;
            btnText.innerText = "BYPASSING API LIMITS...";
            display.innerHTML = `
                <div class="flex flex-col items-center justify-center h-64 space-y-4">
                    <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <div class="text-emerald-500 text-[10px] animate-pulse uppercase tracking-widest font-bold">Requesting Cross-Platform Data...</div>
                </div>
            `;

            try {
                const res = await fetch(WORKER_URL);
                if (!res.ok) throw new Error("Worker offline oder URL falsch.");
                
                const data = await res.json();
                
                // Stats Update
                document.getElementById('stat-poly').innerText = data.opportunities.poly_count || 0;
                document.getElementById('stat-kals').innerText = data.opportunities.kals_count || 0;
                document.getElementById('stat-mani').innerText = data.opportunities.mani_count || 0;

                render(data);
            } catch (e) {
                display.innerHTML = `
                    <div class="p-4 bg-red-950/20 border border-red-500/50 rounded text-red-500 text-xs">
                        <span class="font-bold uppercase tracking-widest">Connection Error:</span><br>
                        Der Worker unter <span class="text-white">${WORKER_URL}</span> antwortet nicht.<br><br>
                        Checkliste:<br>
                        1. Ist der Worker-Code bei Cloudflare gespeichert?<br>
                        2. Ist die Datei index.js auf GitHub vorhanden?
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btnText.innerText = "Execute Full Market Scan";
            }
        }

        function render(data) {
            const display = document.getElementById('display');
            
            if (!data.opportunities.matches || data.opportunities.matches.length === 0) {
                display.innerHTML = `
                    <div class="text-center py-20 border border-dashed border-slate-800 rounded">
                        <div class="text-slate-500 text-xs uppercase tracking-widest">Keine Arbitrage-Matches gefunden.</div>
                        <div class="text-[9px] text-slate-700 mt-2 italic">Märkte sind aktuell effizient. Versuche es in Kürze erneut.</div>
                    </div>
                `;
                return;
            }

            let html = `<div class="text-[10px] border-b border-slate-800 pb-2 mb-4 text-emerald-500 font-bold uppercase">Gefundene Arbitrage-Paare: ${data.opportunities.matches.length}</div>`;

            data.opportunities.matches.forEach(match => {
                html += `
                    <div class="group bg-slate-900/30 border border-slate-800 p-4 rounded hover:border-emerald-500 transition-all">
                        <div class="flex justify-between items-start">
                            <h3 class="text-white text-[11px] font-bold leading-tight">${match.event}</h3>
                            <span class="text-emerald-500 text-[8px] font-black uppercase tracking-tighter border border-emerald-500/20 px-1 rounded">MATCH</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <div>
                                <span class="text-[7px] text-slate-500 uppercase block">Plattformen</span>
                                <span class="text-blue-400 text-[10px] font-bold">${match.platforms.join(' / ')}</span>
                            </div>
                            <div>
                                <span class="text-[7px] text-slate-500 uppercase block">Signal</span>
                                <span class="text-emerald-400 text-[10px] font-bold">${match.potential}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-[7px] text-slate-500 uppercase block">Trace</span>
                                <span class="text-slate-400 text-[9px] italic">${match.details}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            display.innerHTML = html;
        }
    </script>
</body>
</html>
