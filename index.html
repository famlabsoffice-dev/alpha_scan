<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan v2.4 - GLOBAL INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal-scroll::-webkit-scrollbar { width: 3px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #020617; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .market-card { border-left: 3px solid #1e293b; transition: all 0.2s; cursor: pointer; }
        .market-card:hover { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); transform: translateX(5px); }
        .arb-card { border: 1px solid #7f1d1d; background: rgba(127, 29, 29, 0.1); border-left: 6px solid #ef4444; transition: all 0.2s; cursor: pointer; }
        .arb-card:hover { background: rgba(127, 29, 29, 0.2); transform: scale(1.02); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s infinite; }
        .glow-green { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .lang-btn { transition: all 0.2s; border: 1px solid transparent; }
        .lang-btn.active { border-color: #10b981; background: rgba(16, 185, 129, 0.2); color: #fff; }
    </style>
</head>
<body class="bg-[#020617] text-emerald-500 font-mono p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto border border-emerald-900/50 bg-[#020617] p-6 rounded-lg shadow-2xl relative">
        
        <!-- Language Switcher -->
        <div class="flex justify-end gap-2 mb-6">
            <button onclick="setLang('de')" class="lang-btn px-2 py-1 text-[10px] uppercase rounded active" id="btn-de">DE</button>
            <button onclick="setLang('en')" class="lang-btn px-2 py-1 text-[10px] uppercase rounded" id="btn-en">EN</button>
            <button onclick="setLang('pt')" class="lang-btn px-2 py-1 text-[10px] uppercase rounded" id="btn-pt">PT</button>
            <button onclick="setLang('zh')" class="lang-btn px-2 py-1 text-[10px] uppercase rounded" id="btn-zh">ZH</button>
        </div>

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-emerald-900/30 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-emerald-400 glow-green">◣ ALPHASCAN <span class="text-white">GLOBAL</span> v2.4</h1>
                <p id="t-subtitle" class="text-[10px] text-emerald-700 uppercase tracking-widest mt-1">Cross-Platform Prediction Arbitrage Engine</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] pulse-dot flex items-center gap-2 bg-emerald-950/30 px-3 py-1 rounded border border-emerald-800/50">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    <span id="t-status">SYSTEM LIVE</span>
                </span>
                <p id="timestamp" class="text-[9px] text-slate-500 mt-2 tracking-widest">--:--:--</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Arbitrage Signals -->
            <div class="lg:col-span-5 space-y-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-red-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full pulse-dot"></span>
                    <span id="t-signals">Arbitrage Alerts</span>
                </h2>
                <div id="signals" class="h-[600px] overflow-y-auto terminal-scroll space-y-4 pr-2">
                    <div id="t-waiting-signals" class="text-[10px] text-slate-700 italic border border-slate-900/50 p-4">Execute scan to analyze market spreads...</div>
                </div>
            </div>

            <!-- Right: Live Markets -->
            <div class="lg:col-span-7 space-y-4">
                <h2 class="text-xs font-black uppercase tracking-widest text-emerald-600">
                    <span id="t-feed">Global Market Feed</span>
                </h2>
                <div id="terminal" class="h-[600px] overflow-y-auto terminal-scroll grid grid-cols-1 md:grid-cols-2 gap-4 pr-2">
                    <div id="t-waiting-feed" class="col-span-full text-[10px] text-slate-700 italic border border-slate-900/50 p-4 text-center">Awaiting data injection...</div>
                </div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="mt-8 pt-6 border-t border-emerald-900/30 flex flex-col md:flex-row gap-6 items-center">
            <button onclick="executeScan()" id="scanBtn" class="w-full md:w-1/2 py-5 bg-emerald-500/5 border border-emerald-500/50 hover:bg-emerald-500/20 hover:border-emerald-400 transition-all font-black uppercase tracking-[0.3em] text-sm shadow-[0_0_20px_rgba(16,185,129,0.1)]">
                <span id="t-btn">Execute Market Scan</span>
            </button>
            <div class="flex-1 grid grid-cols-2 gap-4 w-full text-center">
                <div class="bg-slate-900/30 border border-emerald-900/30 p-2">
                    <div id="t-latency" class="text-[8px] text-slate-600 uppercase">Latency</div>
                    <div id="latency" class="text-xs font-bold text-emerald-400 italic">-- ms</div>
                </div>
                <div class="bg-slate-900/30 border border-emerald-900/30 p-2">
                    <div id="t-markets" class="text-[8px] text-slate-600 uppercase">Active Markets</div>
                    <div id="count" class="text-xs font-bold text-emerald-400 italic">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            de: {
                subtitle: "Plattformübergreifende Vorhersage-Arbitrage-Engine",
                status: "SYSTEM LIVE",
                signals: "Arbitrage-Signale",
                feed: "Globaler Marktdaten-Feed",
                waiting_signals: "Scan starten, um Marktunterschiede zu analysieren...",
                waiting_feed: "Warte auf Dateneinspeisung...",
                btn: "Markt-Scan ausführen",
                latency: "Latenz",
                markets: "Aktive Märkte",
                diff: "DIFFERENZ",
                view: "ZUM MARKT ↗",
                buy: "WETTE AUF",
                sell: "WETTE GEGEN"
            },
            en: {
                subtitle: "Cross-Platform Prediction Arbitrage Engine",
                status: "SYSTEM LIVE",
                signals: "Arbitrage Alerts",
                feed: "Global Market Feed",
                waiting_signals: "Execute scan to analyze market spreads...",
                waiting_feed: "Awaiting data injection...",
                btn: "Execute Market Scan",
                latency: "Latency",
                markets: "Active Markets",
                diff: "DIFFERENCE",
                view: "VIEW MARKET ↗",
                buy: "BET ON",
                sell: "BET AGAINST"
            },
            pt: {
                subtitle: "Motor de Arbitragem de Previsão Multiplataforma",
                status: "SISTEMA LIVE",
                signals: "Alertas de Arbitragem",
                feed: "Feed de Mercado Global",
                waiting_signals: "Execute o scan para analisar spreads de mercado...",
                waiting_feed: "Aguardando injeção de dados...",
                btn: "Executar Scan de Mercado",
                latency: "Latência",
                markets: "Mercados Ativos",
                diff: "DIFERENÇA",
                view: "VER MERCADO ↗",
                buy: "APOSTAR EM",
                sell: "APOSTAR CONTRA"
            },
            zh: {
                subtitle: "跨平台预测市场套利引擎",
                status: "系统在线",
                signals: "套利信号",
                feed: "全球市场数据流",
                waiting_signals: "执行扫描以分析市场价差...",
                waiting_feed: "等待数据注入...",
                btn: "执行市场扫描",
                latency: "延迟",
                markets: "活跃市场",
                diff: "差价",
                view: "查看市场 ↗",
                buy: "下注于",
                sell: "下注反对"
            }
        };

        let currentLang = 'de';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            
            document.getElementById('t-subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('t-status').innerText = i18n[lang].status;
            document.getElementById('t-signals').innerText = i18n[lang].signals;
            document.getElementById('t-feed').innerText = i18n[lang].feed;
            document.getElementById('t-waiting-signals').innerText = i18n[lang].waiting_signals;
            document.getElementById('t-waiting-feed').innerText = i18n[lang].waiting_feed;
            document.getElementById('t-btn').innerText = i18n[lang].btn;
            document.getElementById('t-latency').innerText = i18n[lang].latency;
            document.getElementById('t-markets').innerText = i18n[lang].markets;
        }

        async function executeScan() {
            const term = document.getElementById('terminal');
            const signals = document.getElementById('signals');
            const btn = document.getElementById('scanBtn');
            const ts = document.getElementById('timestamp');
            
            term.innerHTML = `<div class="col-span-full animate-pulse text-emerald-400 text-[10px]">SYNCING NODES...</div>`;
            signals.innerHTML = `<div class="animate-pulse text-red-400 text-[10px]">CALCULATING SPREADS...</div>`;
            btn.disabled = true;

            try {
                const response = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await response.json();
                
                document.getElementById('latency').innerText = data.t + ' ms';
                document.getElementById('count').innerText = data.m.length;
                ts.innerText = new Date(data.ts).toLocaleTimeString();

                // Render Signals
                if (data.s && data.s.length > 0) {
                    signals.innerHTML = data.s.map(s => {
                        const lowMarket = s.m1.v < s.m2.v ? s.m1 : s.m2;
                        const highMarket = s.m1.v < s.m2.v ? s.m2 : s.m1;
                        return `
                            <div class="p-4 arb-card rounded text-[11px]" onclick="window.open('${lowMarket.u}', '_blank')">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="bg-red-600 text-white px-2 py-0.5 font-black rounded uppercase">${i18n[currentLang].diff}: ${s.d}%</span>
                                    <span class="text-white font-bold uppercase tracking-widest text-[9px]">Score: ${s.score}</span>
                                </div>
                                <div class="text-white font-black mb-3 leading-tight border-b border-red-900/30 pb-2">${s.m1.n}</div>
                                <div class="space-y-2">
                                    <div class="flex justify-between items-center bg-black/40 p-2 border border-red-900/20">
                                        <span class="text-red-400 font-bold">${i18n[currentLang].buy} ${lowMarket.p}:</span>
                                        <span class="text-white font-black">${lowMarket.v.toFixed(1)}%</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-black/40 p-2 border border-red-900/20">
                                        <span class="text-red-400 font-bold">${i18n[currentLang].sell} ${highMarket.p}:</span>
                                        <span class="text-white font-black">${highMarket.v.toFixed(1)}%</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    signals.innerHTML = `<div class="p-4 border border-slate-900 text-slate-700 text-[10px] uppercase text-center">${i18n[currentLang].waiting_signals}</div>`;
                }

                // Render Market Feed
                if (data.m && data.m.length > 0) {
                    term.innerHTML = data.m.map(m => `
                        <div class="p-4 bg-slate-900/20 market-card group" onclick="window.open('${m.u}', '_blank')">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[9px] px-2 py-0.5 bg-emerald-950 text-emerald-400 border border-emerald-800/50 uppercase font-black">${m.p}</span>
                                <span class="text-emerald-400 font-black text-sm italic">${m.v.toFixed(1)}%</span>
                            </div>
                            <div class="text-white text-[11px] font-bold mb-3 leading-tight h-9 overflow-hidden line-clamp-2">${m.n}</div>
                            <div class="flex justify-between items-center mt-3 pt-3 border-t border-emerald-900/10">
                                <span class="text-[8px] text-slate-600 uppercase font-bold italic">VOL: ${Math.round(m.vol).toLocaleString()}</span>
                                <span class="text-[9px] text-emerald-600 font-black group-hover:text-emerald-400">${i18n[currentLang].view}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                ts.innerText = 'SYNC ERROR';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
