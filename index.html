<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan v2.3 - DEVIL SPEED ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal-scroll::-webkit-scrollbar { width: 3px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #020617; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .market-card { border-left: 2px solid #1e293b; transition: all 0.1s; }
        .market-card:hover { border-left-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .arb-card { border: 1px solid #7f1d1d; background: rgba(127, 29, 29, 0.1); border-left: 4px solid #ef4444; }
        .arb-card:hover { background: rgba(127, 29, 29, 0.2); }
        @keyframes scan-line { 0% { top: 0; } 100% { top: 100%; } }
        .scan-line { position: absolute; height: 2px; width: 100%; background: rgba(16, 185, 129, 0.2); animation: scan-line 2s linear infinite; pointer-events: none; }
        .glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .glow-green { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.1), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="bg-[#020617] text-emerald-500 font-mono p-4 md:p-8 min-h-screen overflow-x-hidden">
    <div class="max-w-6xl mx-auto border border-emerald-900/50 bg-[#020617] p-4 md:p-6 rounded shadow-[0_0_50px_rgba(16,185,129,0.05)] relative overflow-hidden">
        <div class="scan-line"></div>
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-emerald-900/30 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-emerald-400 glow-green">◣ ALPHASCAN <span class="text-red-500">DEVIL SPEED</span> v2.3</h1>
                <div class="flex gap-4 mt-2">
                    <span class="text-[9px] text-emerald-700 uppercase tracking-widest border border-emerald-900/50 px-2 py-0.5">Ultra-Precision Engine</span>
                    <span class="text-[9px] text-red-700 uppercase tracking-widest border border-red-900/50 px-2 py-0.5">Zero-Latency Mode</span>
                </div>
            </div>
            <div class="text-right w-full md:w-auto">
                <div class="flex items-center justify-end gap-3 mb-2">
                    <span class="text-[10px] bg-emerald-950/30 text-emerald-500 px-3 py-1 rounded border border-emerald-800/50 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        NODES SYNCED
                    </span>
                </div>
                <div id="status-bar" class="text-[9px] text-slate-500 uppercase tracking-tighter">Ready for injection...</div>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left: High-Profit Signals -->
            <div class="lg:col-span-4 space-y-4">
                <div class="flex justify-between items-end border-b border-red-900/30 pb-2">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-red-500 glow-red">Arbitrage Alerts</h2>
                    <span class="text-[8px] text-red-900 uppercase">Live Detection</span>
                </div>
                <div id="signals" class="h-[600px] overflow-y-auto terminal-scroll space-y-3 pr-2">
                    <div class="text-[10px] text-slate-700 border border-slate-900/50 p-4 italic">Initialize scan to detect market inefficiencies...</div>
                </div>
            </div>

            <!-- Right: Real-Time Feed -->
            <div class="lg:col-span-8 space-y-4">
                <div class="flex justify-between items-end border-b border-emerald-900/30 pb-2">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-emerald-600">Global Market Feed</h2>
                    <span class="text-[8px] text-emerald-900 uppercase">Top 25 Volume</span>
                </div>
                <div id="terminal" class="h-[600px] overflow-y-auto terminal-scroll grid grid-cols-1 md:grid-cols-2 gap-3 pr-2 content-start">
                    <div class="col-span-full h-full flex items-center justify-center text-emerald-900/30 uppercase text-4xl font-black rotate-[-5deg] select-none">
                        AlphaScan Inactive
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="mt-8 pt-6 border-t border-emerald-900/30 flex flex-col md:flex-row gap-6 items-center">
            <button onclick="executeScan()" id="scanBtn" class="w-full md:w-2/3 py-5 bg-emerald-500/5 border border-emerald-500/50 hover:bg-emerald-500/20 hover:border-emerald-400 transition-all font-black uppercase tracking-[0.3em] text-sm relative group overflow-hidden">
                <span class="relative z-10 group-hover:text-white transition-colors">EXECUTE HIGH-SPEED SCAN</span>
                <div class="absolute inset-0 shimmer opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </button>
            <div class="flex-1 grid grid-cols-3 gap-2 w-full">
                <div class="bg-slate-900/30 border border-emerald-900/30 p-2 text-center">
                    <div class="text-[8px] text-slate-600 uppercase">Latency</div>
                    <div id="latency" class="text-xs font-bold text-emerald-400 italic">-- ms</div>
                </div>
                <div class="bg-slate-900/30 border border-emerald-900/30 p-2 text-center">
                    <div class="text-[8px] text-slate-600 uppercase">Markets</div>
                    <div id="count" class="text-xs font-bold text-emerald-400 italic">0</div>
                </div>
                <div class="bg-slate-900/30 border border-emerald-900/30 p-2 text-center">
                    <div class="text-[8px] text-slate-600 uppercase">Signals</div>
                    <div id="sig-count" class="text-xs font-bold text-red-500 italic">0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function executeScan() {
            const term = document.getElementById('terminal');
            const signals = document.getElementById('signals');
            const btn = document.getElementById('scanBtn');
            const status = document.getElementById('status-bar');
            
            status.innerHTML = `<span class="text-emerald-400">INJECTING...</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await response.json();
                
                document.getElementById('latency').innerText = data.t + ' ms';
                document.getElementById('count').innerText = data.m.length;
                document.getElementById('sig-count').innerText = data.s.length;
                status.innerText = 'LAST SYNC: ' + new Date(data.ts).toLocaleTimeString();

                // Render Arbitrage Signals
                if (data.s && data.s.length > 0) {
                    signals.innerHTML = data.s.map(s => `
                        <div class="p-4 arb-card rounded group cursor-pointer transition-transform hover:scale-[1.02]">
                            <div class="flex justify-between items-center mb-3">
                                <span class="bg-red-600 text-white text-[9px] px-2 py-0.5 font-black uppercase tracking-tighter">DIFF: ${s.d}%</span>
                                <span class="text-[9px] text-red-400 font-bold uppercase tracking-widest">Score: ${s.score}</span>
                            </div>
                            <div class="text-white text-xs font-black mb-3 leading-tight border-b border-red-900/30 pb-2">${s.m1.n}</div>
                            <div class="grid grid-cols-2 gap-2 text-[9px]">
                                <a href="${s.m1.u}" target="_blank" class="bg-black/50 p-2 border border-red-900/30 hover:border-red-500 transition-colors">
                                    <div class="text-red-500 font-bold mb-1 uppercase">${s.m1.p}</div>
                                    <div class="text-white font-black text-[11px]">${s.m1.v.toFixed(1)}%</div>
                                </a>
                                <a href="${s.m2.u}" target="_blank" class="bg-black/50 p-2 border border-red-900/30 hover:border-red-500 transition-colors">
                                    <div class="text-red-500 font-bold mb-1 uppercase">${s.m2.p}</div>
                                    <div class="text-white font-black text-[11px]">${s.m2.v.toFixed(1)}%</div>
                                </a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    signals.innerHTML = `<div class="p-6 border border-slate-900 text-slate-700 text-[10px] text-center uppercase tracking-widest italic">Scanning horizon clear. No inefficiencies found.</div>`;
                }

                // Render Market Feed
                if (data.m && data.m.length > 0) {
                    term.innerHTML = data.m.map(m => `
                        <div class="p-4 bg-slate-900/20 market-card group relative overflow-hidden">
                            <div class="flex justify-between items-start mb-2 relative z-10">
                                <span class="text-[8px] px-2 py-0.5 bg-emerald-950 text-emerald-400 border border-emerald-800/50 uppercase font-black">${m.p}</span>
                                <span class="text-emerald-400 font-black text-sm glow-green italic">${m.v.toFixed(1)}%</span>
                            </div>
                            <div class="text-white text-[11px] font-bold mb-3 leading-tight h-9 overflow-hidden line-clamp-2 relative z-10">${m.n}</div>
                            <div class="flex justify-between items-center mt-3 pt-3 border-t border-emerald-900/10 relative z-10">
                                <span class="text-[8px] text-slate-600 uppercase font-bold tracking-tighter">VOL: ${Math.round(m.vol).toLocaleString()}</span>
                                <a href="${m.u}" target="_blank" class="text-[9px] text-emerald-500 hover:text-white transition-colors uppercase font-black tracking-widest">LINK ↗</a>
                            </div>
                            <div class="absolute inset-0 shimmer opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                status.innerHTML = `<span class="text-red-500 font-black uppercase tracking-widest">CRITICAL SYNC ERROR</span>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
