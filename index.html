<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan v2.0 - Live Prediction Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #020617; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .market-card { border-left: 4px solid #065f46; transition: all 0.2s; }
        .market-card:hover { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s infinite; }
    </style>
</head>
<body class="bg-black text-emerald-500 font-mono p-4 md:p-10 min-h-screen">
    <div class="max-w-4xl mx-auto border border-emerald-900 bg-slate-950 p-6 rounded-lg shadow-2xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 border-b border-emerald-900 pb-4">
            <div>
                <h1 class="text-xl font-bold tracking-tighter">◣ ALPHASCAN CORE v2.1</h1>
                <p class="text-[10px] text-emerald-700 uppercase tracking-widest">Multi-Platform Arbitrage Engine</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] pulse-dot flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    SYSTEM LIVE
                </span>
                <p id="timestamp" class="text-[9px] text-slate-500 mt-1">--:--:--</p>
            </div>
        </div>

        <!-- Terminal Output -->
        <div id="terminal" class="h-[500px] overflow-y-auto mb-6 p-4 bg-black/50 border border-slate-900 text-xs terminal-scroll">
            <div class="text-emerald-800 italic">Awaiting secure connection... Click 'Execute Market Scan' to begin real-time data ingestion.</div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="executeScan()" id="scanBtn" class="py-4 border border-emerald-500 hover:bg-emerald-500/20 transition-all font-bold uppercase tracking-widest text-sm">
                Execute Market Scan
            </button>
            <div class="flex items-center justify-center border border-emerald-900 bg-slate-900/50 text-[10px] px-4 py-2 text-center uppercase">
                Monitoring: Polymarket, Manifold, Kalshi
            </div>
        </div>
    </div>

    <script>
        async function executeScan() {
            const term = document.getElementById('terminal');
            const btn = document.getElementById('scanBtn');
            const ts = document.getElementById('timestamp');
            
            term.innerHTML = `<div class="animate-pulse text-emerald-400">INITIALIZING SECURE SCAN...<br>POLLING PUBLIC ENDPOINTS...</div>`;
            btn.disabled = true;

            try {
                const response = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await response.json();
                
                ts.innerText = new Date(data.timestamp).toLocaleTimeString();

                if (data.results && data.results.length > 0) {
                    term.innerHTML = data.results.map(m => `
                        <div class="mb-4 p-3 bg-slate-900/40 market-card group">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[10px] px-1.5 py-0.5 bg-emerald-950 text-emerald-400 border border-emerald-800 rounded uppercase font-bold">${m.platform}</span>
                                <span class="text-emerald-400 font-bold text-lg">${m.price}</span>
                            </div>
                            <div class="text-white text-xs mb-2 leading-relaxed">${m.name}</div>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] text-slate-500 italic">Vol: ${m.volume || 'N/A'}</span>
                                <a href="${m.url}" target="_blank" class="text-[10px] text-emerald-600 hover:text-emerald-400 underline uppercase tracking-tighter">View Market ↗</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    term.innerHTML = `<div class="p-4 border border-yellow-900 bg-yellow-950/20 text-yellow-500">SCAN COMPLETE: NO LIVE MARKETS DETECTED IN CURRENT BUFFER.</div>`;
                }
            } catch (err) {
                term.innerHTML = `<div class="p-4 border border-red-900 bg-red-950/20 text-red-500 font-bold italic uppercase">CRITICAL ERROR: CONNECTION TO WORKER FAILED. CHECK CORS CONFIGURATION.</div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
