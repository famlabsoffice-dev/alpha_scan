<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan Terminal | v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #00ff88; font-family: 'JetBrains Mono', monospace; }
        .terminal-box { border: 1px solid rgba(0, 255, 136, 0.2); background: rgba(15, 23, 42, 0.8); }
        .live-dot { height: 8px; width: 8px; background: #00ff88; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="w-full max-w-4xl terminal-box rounded-xl p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-xl font-bold tracking-widest text-white">◣ ALPHASCAN <span class="text-emerald-500 font-black">v1.0</span></h1>
            <div class="text-right">
                <span class="live-dot mr-2"></span> <span class="text-[10px] uppercase font-bold">System Online</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-900/50 p-4 border border-slate-800 rounded text-center">
                <div class="text-slate-500 text-[10px] uppercase mb-1">Polymarket</div>
                <div id="stat-poly" class="text-2xl font-bold text-white">--</div>
            </div>
            <div class="bg-slate-900/50 p-4 border border-slate-800 rounded text-center">
                <div class="text-slate-500 text-[10px] uppercase mb-1">Kalshi</div>
                <div id="stat-kals" class="text-2xl font-bold text-white">--</div>
            </div>
            <div class="bg-slate-900/50 p-4 border border-slate-800 rounded text-center">
                <div class="text-slate-500 text-[10px] uppercase mb-1">Manifold</div>
                <div id="stat-mani" class="text-2xl font-bold text-white">--</div>
            </div>
        </div>

        <div id="display" class="bg-black/40 border border-slate-800 rounded-lg p-6 min-h-[300px] mb-8 text-sm leading-relaxed">
            <div class="text-slate-500 italic uppercase text-xs">Bereit für Initial-Scan...</div>
        </div>

        <button onclick="runScan()" id="btn" class="w-full py-4 bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 font-bold uppercase tracking-widest hover:bg-emerald-500/20 transition-all">
            Execute Full Market Scan
        </button>
    </div>

    <script>
        // DIE NEUE SAUBERE URL
        const WORKER_URL = 'https://alphascan.famlabsoffice.workers.dev/';

        async function runScan() {
            const display = document.getElementById('display');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            btn.innerText = "Scanning Ecosystem...";
            display.innerHTML = '<div class="text-emerald-500 animate-pulse uppercase text-xs">Connecting to Cloudflare Edge...</div>';

            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();

                document.getElementById('stat-poly').innerText = data.opportunities.poly_count;
                document.getElementById('stat-kals').innerText = data.opportunities.kals_count;
                document.getElementById('stat-mani').innerText = data.opportunities.mani_count;

                display.innerHTML = `<div class="text-emerald-400">✅ Scan abgeschlossen um ${new Date().toLocaleTimeString()}</div>
                                     <div class="mt-4 text-slate-400 text-xs tracking-tighter">System empfängt Datenströme. Alle APIs antworten im grünen Bereich.</div>`;
            } catch (err) {
                display.innerHTML = `<div class="text-red-500 font-bold">CRITICAL ERROR:</div>
                                     <div class="text-red-400 text-xs mt-2 italic">${err.message}</div>
                                     <div class="text-slate-600 text-[10px] mt-4 uppercase">Check: Ist der Worker 'alphascan' bei Cloudflare deployed?</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute Full Market Scan";
            }
        }
    </script>
</body>
</html>
