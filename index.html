<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AlphaScan Ultra-Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-emerald-400 p-5 font-mono">
    <div class="max-w-md mx-auto border border-emerald-900 p-4 rounded-lg bg-slate-900">
        <h1 class="text-white font-bold border-b border-emerald-900 mb-4">◣ ALPHASCAN LIGHT</h1>
        <div id="out" class="text-[10px] h-60 overflow-y-auto mb-4 italic">Bereit...</div>
        <button onclick="scan()" class="w-full py-2 border border-emerald-500 hover:bg-emerald-500 hover:text-black transition-all font-bold uppercase">Start Scan</button>
    </div>

    <script>
        async function scan() {
            const out = document.getElementById('out');
            out.innerHTML = "VERBINDE...";
            try {
                const res = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await res.json();
                if (data.error) {
                    out.innerHTML = "FEHLER: " + data.error;
                } else {
                    out.innerHTML = data.markets.map(m => 
                        `<div class="mb-2 p-1 border-b border-slate-800 text-white">${m.title} <br> <span class="text-emerald-500">Preis: ${m.price}</span></div>`
                    ).join('');
                }
            } catch (e) {
                out.innerHTML = "NETZWERK-FEHLER. Prüfe Cloudflare Deployment.";
            }
        }
    </script>
</body>
</html>
