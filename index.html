<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan v2.2 - Live Arbitrage Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal-scroll::-webkit-scrollbar { width: 4px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #020617; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .market-card { border-left: 4px solid #065f46; transition: all 0.2s; }
        .market-card:hover { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .arb-card { border: 1px solid #dc2626; background: rgba(220, 38, 38, 0.1); border-left: 6px solid #ef4444; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-dot { animation: pulse-dot 1.5s infinite; }
        .glow-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="bg-black text-emerald-500 font-mono p-4 md:p-10 min-h-screen">
    <div class="max-w-5xl mx-auto border border-emerald-900 bg-slate-950 p-6 rounded-lg shadow-2xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 border-b border-emerald-900 pb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter glow-text italic">◣ ALPHASCAN CORE v2.2</h1>
                <p class="text-[10px] text-emerald-700 uppercase tracking-widest">Cross-Platform Prediction Arbitrage</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] pulse-dot flex items-center gap-2 bg-emerald-950/50 px-3 py-1 rounded-full border border-emerald-900">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    SYSTEM LIVE
                </span>
                <p id="timestamp" class="text-[9px] text-slate-500 mt-2 tracking-widest uppercase">AWAITING SCAN...</p>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left: Arbitrage Signals -->
            <div class="lg:col-span-1 border-r border-emerald-900/30 pr-0 lg:pr-6">
                <h2 class="text-xs font-bold mb-4 uppercase tracking-widest text-red-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full pulse-dot"></span>
                    Arbitrage Signals
                </h2>
                <div id="signals" class="h-[500px] overflow-y-auto terminal-scroll space-y-3">
                    <div class="text-[10px] text-slate-600 italic">No signals detected yet. Execute scan to begin...</div>
                </div>
            </div>

            <!-- Right: Live Markets -->
            <div class="lg:col-span-2">
                <h2 class="text-xs font-bold mb-4 uppercase tracking-widest text-emerald-600">
                    Live Data Feed (Top Volume)
                </h2>
                <div id="terminal" class="h-[500px] overflow-y-auto terminal-scroll grid grid-cols-1 md:grid-cols-2 gap-3 pr-2">
                    <div class="col-span-full text-[10px] text-slate-600 italic">Feed inactive...</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-8 pt-6 border-t border-emerald-900 flex flex-col md:flex-row gap-4 items-center justify-between">
            <button onclick="executeScan()" id="scanBtn" class="w-full md:w-1/2 py-4 bg-emerald-900/20 border border-emerald-500 hover:bg-emerald-500/20 transition-all font-black uppercase tracking-widest text-sm shadow-[0_0_20px_rgba(16,185,129,0.1)]">
                Execute Market Scan
            </button>
            <div class="text-[9px] text-slate-500 uppercase tracking-tighter text-center md:text-right">
                Connected Nodes: <span class="text-emerald-400">Polymarket (Gamma)</span>, <span class="text-emerald-400">Manifold</span>, <span class="text-emerald-400">Kalshi (v2)</span>
            </div>
        </div>
    </div>

    <script>
        async function executeScan() {
            const term = document.getElementById('terminal');
            const signals = document.getElementById('signals');
            const btn = document.getElementById('scanBtn');
            const ts = document.getElementById('timestamp');
            
            term.innerHTML = `<div class="col-span-full animate-pulse text-emerald-400 text-[10px]">SYNCING DATA NODES...</div>`;
            signals.innerHTML = `<div class="animate-pulse text-red-400 text-[10px]">ANALYZING SPREADS...</div>`;
            btn.disabled = true;

            try {
                const response = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await response.json();
                
                ts.innerText = 'LAST SYNC: ' + new Date(data.timestamp).toLocaleTimeString();

                // Render Signals
                if (data.signals && data.signals.length > 0) {
                    signals.innerHTML = data.signals.map(s => `
                        <div class="p-3 arb-card rounded text-[10px]">
                            <div class="flex justify-between items-center mb-2">
                                <span class="bg-red-950 text-red-400 px-1.5 py-0.5 rounded font-bold uppercase tracking-tighter">DIFF: ${s.difference}</span>
                                <span class="text-white font-bold">${s.severity}</span>
                            </div>
                            <div class="text-white font-bold mb-1 truncate">${s.market1.name}</div>
                            <div class="flex justify-between text-slate-400 mb-1">
                                <span>${s.market1.platform}: ${s.market1.price.toFixed(1)}%</span>
                                <span>${s.market2.platform}: ${s.market2.price.toFixed(1)}%</span>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <a href="${s.market1.url}" target="_blank" class="flex-1 bg-slate-900 text-center py-1 hover:bg-slate-800 border border-slate-800">P1 ↗</a>
                                <a href="${s.market2.url}" target="_blank" class="flex-1 bg-slate-900 text-center py-1 hover:bg-slate-800 border border-slate-800">P2 ↗</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    signals.innerHTML = `<div class="p-3 border border-slate-900 text-slate-600 text-[10px]">NO ARBITRAGE SIGNALS FOUND IN CURRENT BUFFER.</div>`;
                }

                // Render Markets
                if (data.all_markets && data.all_markets.length > 0) {
                    term.innerHTML = data.all_markets.map(m => `
                        <div class="p-3 bg-slate-900/40 market-card group">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[9px] px-1.5 py-0.5 bg-emerald-950 text-emerald-400 border border-emerald-800 rounded uppercase font-bold">${m.platform}</span>
                                <span class="text-emerald-400 font-bold text-sm">${m.price.toFixed(1)}%</span>
                            </div>
                            <div class="text-white text-[10px] mb-2 leading-tight h-8 overflow-hidden line-clamp-2">${m.name}</div>
                            <div class="flex justify-between items-center mt-2 pt-2 border-t border-emerald-900/20">
                                <span class="text-[8px] text-slate-500 uppercase tracking-tighter italic">VOL: ${Math.round(m.volume).toLocaleString()}</span>
                                <a href="${m.url}" target="_blank" class="text-[9px] text-emerald-600 hover:text-emerald-400 underline uppercase tracking-tighter">VIEW ↗</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    term.innerHTML = `<div class="col-span-full p-4 border border-yellow-900 text-yellow-500 text-[10px]">NO LIVE MARKETS DETECTED.</div>`;
                }
            } catch (err) {
                term.innerHTML = `<div class="col-span-full p-4 border border-red-900 text-red-500 text-[10px] uppercase">CRITICAL ERROR: SYNC FAILED.</div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
