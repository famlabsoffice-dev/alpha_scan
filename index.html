<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaScan v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-emerald-500 font-mono p-4 md:p-10">
    <div class="max-w-2xl mx-auto border border-emerald-900 bg-slate-950 p-6 rounded-lg shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-emerald-900 pb-4">
            <h1 class="text-lg font-bold">◣ ALPHASCAN CORE v2.0</h1>
            <span class="text-[10px] animate-pulse">● SYSTEM LIVE</span>
        </div>

        <div id="terminal" class="h-64 overflow-y-auto mb-6 p-4 bg-black/50 border border-slate-900 text-xs">
            Awaiting Command...
        </div>

        <button onclick="executeScan()" id="scanBtn" class="w-full py-3 border border-emerald-500 hover:bg-emerald-500/20 transition-all font-bold uppercase tracking-widest">
            Execute Market Scan
        </button>
    </div>

    <script>
        async function executeScan() {
            const term = document.getElementById('terminal');
            const btn = document.getElementById('scanBtn');
            term.innerHTML = "INITIALIZING SECURE SCAN...";
            btn.disabled = true;

            try {
                const response = await fetch('https://alphascan.famlabsoffice.workers.dev/');
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    term.innerHTML = data.results.map(m => 
                        `<div class="mb-3 p-2 border-l-2 border-emerald-800 bg-slate-900/40">
                            <div class="text-white">${m.name}</div>
                            <div class="text-emerald-400 font-bold">DIFFERENZ: ${m.diff}</div>
                        </div>`
                    ).join('');
                } else {
                    term.innerHTML = "SCAN COMPLETE: NO ARBITRAGE DETECTED IN CURRENT BUFFER.";
                }
            } catch (err) {
                term.innerHTML = "CRITICAL ERROR: CONNECTION TO WORKER FAILED.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
