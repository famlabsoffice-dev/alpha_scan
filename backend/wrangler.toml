name = "alphascan-backend"
main = "src/worker.ts"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "alphascan-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# KV Namespace (Session blacklist, nonces, rate limits)
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Cron Trigger: Reset expired tiers every hour
[triggers]
crons = ["0 * * * *"]

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET
# ALCHEMY_API_KEY
# RECEIVER_ADDRESS_ETH
# RECEIVER_ADDRESS_SOL

[vars]
AUTH_PASSWORD = "TGMFAM2026"
